<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>술쟁이 와인 노트</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Noto+Serif+KR:wght@300;400&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1714;
    --parchment: #f7f3ed;
    --cream: #ede8df;
    --rule: #c8bfb0;
    --muted: #8a8078;
    --red-wine: #6b1e2e;
    --gold: #b89a5a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--parchment);
    color: var(--ink);
    font-family: 'Noto Serif KR', serif;
    font-weight: 300;
    min-height: 100vh;
  }

  /* ── LOCK SCREEN ── */
  #lock-screen {
    position: fixed; inset: 0;
    background: var(--ink);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 1000;
    gap: 2rem;
  }

  #lock-screen h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(2rem, 5vw, 3.2rem);
    color: var(--parchment);
    letter-spacing: 0.15em;
    text-align: center;
  }

  #lock-screen p {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: var(--rule);
    font-size: 1rem;
    letter-spacing: 0.05em;
  }

  .lock-divider {
    width: 60px; height: 1px;
    background: var(--gold);
  }

  #lock-input-wrap {
    display: flex; flex-direction: column; align-items: center; gap: 0.75rem;
  }

  #password-input {
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--rule);
    color: var(--parchment);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    letter-spacing: 0.3em;
    text-align: center;
    width: 200px;
    padding: 0.4rem 0;
    outline: none;
    transition: border-color 0.2s;
  }
  #password-input:focus { border-bottom-color: var(--gold); }

  #lock-error {
    color: #c0706a;
    font-size: 0.8rem;
    letter-spacing: 0.05em;
    height: 1rem;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
  }

  #unlock-btn {
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.85rem;
    letter-spacing: 0.2em;
    padding: 0.6rem 2rem;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 0.5rem;
  }
  #unlock-btn:hover { background: var(--gold); color: var(--ink); }

  /* ── MAIN ── */
  #app { display: none; }

  /* ── HEADER ── */
  header {
    text-align: center;
    padding: 4rem 2rem 2rem;
    border-bottom: 1px solid var(--rule);
    position: relative;
  }

  .header-eyebrow {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: var(--muted);
    font-size: 0.85rem;
    letter-spacing: 0.15em;
    margin-bottom: 0.75rem;
  }

  header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(2.2rem, 5vw, 3.8rem);
    letter-spacing: 0.08em;
    line-height: 1.1;
    color: var(--ink);
  }

  .header-rule {
    display: flex; align-items: center; gap: 1rem;
    margin: 1.5rem auto;
    max-width: 300px;
    justify-content: center;
  }
  .header-rule span { width: 60px; height: 1px; background: var(--rule); display: block; }
  .header-rule .diamond {
    width: 5px; height: 5px;
    background: var(--gold);
    transform: rotate(45deg);
    flex-shrink: 0;
  }

  .header-subtitle {
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* ── CONTROLS ── */
  .controls {
    max-width: 900px;
    margin: 2rem auto 0;
    padding: 0 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .filter-group {
    display: flex; gap: 0.5rem; flex-wrap: wrap;
  }

  .filter-btn {
    background: transparent;
    border: 1px solid var(--rule);
    color: var(--muted);
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    padding: 0.35rem 1rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover, .filter-btn.active {
    border-color: var(--red-wine);
    color: var(--red-wine);
    background: rgba(107,30,46,0.04);
  }

  .refresh-btn {
    background: transparent;
    border: none;
    color: var(--muted);
    font-family: 'Noto Serif KR', serif;
    font-size: 0.75rem;
    letter-spacing: 0.05em;
    cursor: pointer;
    display: flex; align-items: center; gap: 0.4rem;
    padding: 0.35rem 0;
    transition: color 0.2s;
  }
  .refresh-btn:hover { color: var(--ink); }
  .refresh-btn svg { transition: transform 0.5s; }
  .refresh-btn.spinning svg { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── STATUS ── */
  #status-bar {
    max-width: 900px;
    margin: 1rem auto 0;
    padding: 0 2rem;
    font-size: 0.75rem;
    color: var(--muted);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    min-height: 1.2rem;
  }

  /* ── WINE LIST ── */
  #wine-list {
    max-width: 900px;
    margin: 2rem auto 4rem;
    padding: 0 2rem;
  }

  /* ── SECTION HEADER (지역별) ── */
  .section-header {
    display: flex; align-items: center; gap: 1.5rem;
    margin: 2.5rem 0 1rem;
  }
  .section-header h2 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
  }
  .section-line { flex: 1; height: 1px; background: var(--rule); }

  /* ── WINE TABLE ── */
  .wine-table-head {
    display: grid;
    grid-template-columns: 3fr 0.8fr 1.5fr 1.5fr 0.6fr;
    padding: 0.4rem 0.8rem;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 0.2rem;
  }
  .wine-table-head span {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.68rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .wine-row {
    display: grid;
    grid-template-columns: 3fr 0.8fr 1.5fr 1.5fr 0.6fr;
    align-items: center;
    padding: 0.75rem 0.8rem;
    border-bottom: 1px solid var(--cream);
    transition: background 0.1s;
    overflow: hidden;
  }
  .wine-row:hover { background: rgba(184,154,90,0.05); }

  .wine-row .col-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    font-weight: 400;
    color: var(--ink);
    padding-right: 1rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .wine-row .col-vintage {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.95rem;
    color: var(--muted);
    white-space: nowrap;
  }
  .wine-row .col-region,
  .wine-row .col-variety {
    font-size: 0.78rem;
    letter-spacing: 0.04em;
    color: #5a5450;
    padding-right: 0.5rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .wine-row .col-note { text-align: center; }

  .tasting-toggle {
    background: transparent;
    border: 1px solid var(--rule);
    color: var(--muted);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.72rem;
    letter-spacing: 0.05em;
    cursor: pointer;
    padding: 0.2rem 0.5rem;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .tasting-toggle:hover { border-color: var(--gold); color: var(--red-wine); }

  .tasting-note-row {
    display: none;
    padding: 0.8rem 1rem 1rem;
    background: var(--cream);
    border-left: 2px solid var(--gold);
    border-bottom: 1px solid var(--rule);
    font-size: 0.83rem;
    line-height: 1.9;
    color: #4a4540;
    white-space: pre-line;
    font-family: 'Noto Serif KR', serif;
  }
  .tasting-note-row.open { display: block; }

  @media (max-width: 650px) {
    .wine-table-head { display: none; }
    .wine-row {
      grid-template-columns: 1fr auto;
      grid-template-rows: auto auto;
      gap: 0.2rem 0;
    }
    .wine-row .col-name { grid-column: 1; grid-row: 1; }
    .wine-row .col-vintage { grid-column: 2; grid-row: 1; }
    .wine-row .col-region { grid-column: 1; grid-row: 2; font-size: 0.72rem; }
    .wine-row .col-variety { display: none; }
    .wine-row .col-note { grid-column: 2; grid-row: 2; }
  }

  /* ── EMPTY / LOADING ── */
  .state-msg {
    text-align: center;
    padding: 4rem 2rem;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: var(--muted);
    font-size: 1rem;
    letter-spacing: 0.05em;
  }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    padding: 2rem;
    border-top: 1px solid var(--rule);
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    color: var(--rule);
    font-family: 'Cormorant Garamond', serif;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .wine-meta { gap: 0.8rem; }
    .wine-name { font-size: 1rem; }
    .controls { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>

<!-- LOCK SCREEN -->
<div id="lock-screen">
  <p class="header-eyebrow" style="color:#8a8078">술쟁이 와인 노트</p>
  <div class="lock-divider"></div>
  <h1>🍷</h1>
  <div id="lock-input-wrap">
    <input type="password" id="password-input" placeholder="· · · · ·" autocomplete="off">
    <div id="lock-error"></div>
    <button id="unlock-btn" onclick="unlock()">ENTER</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <header>
    <p class="header-eyebrow">Ma Cave Personnelle</p>
    <h1>술쟁이 와인 노트</h1>
    <div class="header-rule">
      <span></span>
      <div class="diamond"></div>
      <span></span>
    </div>
    <p class="header-subtitle">Carnet de Dégustation</p>
  </header>

  <div class="controls">
    <div class="filter-group">
      <button class="filter-btn active" onclick="setFilter('all', this)">전체</button>
      <button class="filter-btn" onclick="setFilter('France', this)">🇫🇷 France</button>
      <button class="filter-btn" onclick="setFilter('Italy', this)">🇮🇹 Italy</button>
      <button class="filter-btn" onclick="setFilter('USA', this)">🇺🇸 USA</button>
      <button class="filter-btn" onclick="setFilter('Spain', this)">🇪🇸 Spain</button>
    </div>
    <button class="refresh-btn" id="refresh-btn" onclick="loadWines(true)">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M23 4v6h-6M1 20v-6h6"/>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
      </svg>
      업데이트
    </button>
  </div>

  <div id="status-bar"></div>
  <div id="wine-list"><div class="state-msg">와인 리스트를 불러오는 중…</div></div>

  <footer>술쟁이 와인 노트 &nbsp;·&nbsp; 개인 시음 기록</footer>
</div>

<script>
// ── 설정 ──────────────────────────────────────────
const PASSWORD = "asdf7410*";
const BLOG_RSS = "/api/rss";
const CACHE_KEY = "wine_cache";
const CACHE_TS_KEY = "wine_cache_ts";

let allWines = [];
let currentFilter = 'all';

// ── 잠금 해제 ─────────────────────────────────────
function unlock() {
  const val = document.getElementById('password-input').value;
  if (val === PASSWORD) {
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadWines(false);
  } else {
    document.getElementById('lock-error').textContent = '비밀번호가 맞지 않습니다';
    document.getElementById('password-input').value = '';
    setTimeout(() => document.getElementById('lock-error').textContent = '', 2000);
  }
}

document.getElementById('password-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') unlock();
});

// ── 캐시 ─────────────────────────────────────────
function getCache() {
  try {
    const data = localStorage.getItem(CACHE_KEY);
    return data ? JSON.parse(data) : null;
  } catch { return null; }
}

function setCache(wines) {
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify(wines));
    localStorage.setItem(CACHE_TS_KEY, Date.now().toString());
  } catch {}
}

// ── 상태 메시지 ───────────────────────────────────
function setStatus(msg) {
  document.getElementById('status-bar').textContent = msg;
}

// ── RSS 파싱 ─────────────────────────────────────
async function fetchRSS() {
  const resp = await fetch(BLOG_RSS);
  const text = await resp.text();
  const parser = new DOMParser();
  const xml = parser.parseFromString(text, 'text/xml');
  return [...xml.querySelectorAll('item')];
}

function parseItem(item) {
  const title = item.querySelector('title')?.textContent?.trim() || '';
  const link = item.querySelector('link')?.textContent?.trim() || '';
  const category = item.querySelector('category')?.textContent?.trim() || '';
  
  // 여행 글 제외
  if (category.includes('여행') || title.includes('여행')) return null;

  // RSS description에서 본문 텍스트 추출
  const descRaw = item.querySelector('description')?.textContent || '';
  const descDoc = new DOMParser().parseFromString(descRaw, 'text/html');
  const body = descDoc.body?.textContent || '';

  const path = link.replace('https://oaklifeisgood.tistory.com', '');

  return parseWineData(body, title, path);
}

function parseWineData(body, title, path) {
  const get = (label) => {
    const regex = new RegExp(label + '[:\\s]+([^\\n]+)', 'i');
    const m = body.match(regex);
    return m ? m[1].replace(/[*_]/g, '').trim() : '';
  };

  // 제목에서 이모지 제거
  const cleanTitle = title.replace(/[\p{Emoji}]/gu, '').trim();

  // 빈티지: 제목 또는 본문에서
  const vintageMatch = cleanTitle.match(/\b(19|20)\d{2}\b/) || body.match(/빈티지[:\s]+([^\n]+)/);
  const vintage = vintageMatch ? vintageMatch[1] || vintageMatch[0] : (get('빈티지') || 'NV');

  // 지역 → 국가
  const region = get('지역') || '';
  let country = 'France';
  if (region.toLowerCase().includes('italy') || region.includes('이탈리아')) country = 'Italy';
  else if (region.toLowerCase().includes('usa') || region.includes('미국') || region.toLowerCase().includes('california')) country = 'USA';
  else if (region.toLowerCase().includes('spain') || region.includes('스페인') || region.toLowerCase().includes('rioja')) country = 'Spain';

  // 테이스팅 노트
  const tastingMatch = body.match(/테이스팅\s*노트[^\n]*\n([\s\S]*?)(?=서쳐\s*가격|생산자|$)/i);
  const tasting = tastingMatch ? tastingMatch[1].replace(/[✔️▶✅]/g, '').trim() : '';

  // 지역: 마지막 단어만 (Gevrey-Chambertin, Barolo 등)
  const regionFull = region;
  const regionDisplay = region.includes(',')
    ? region.split(',').slice(-1)[0].trim()
    : region.trim();

  // 품종: 단일 100%면 이름만, 블렌딩이면 "CS 60% / ME 40%" 형태로
  const varietyRaw = get('품종') || '';
  const varietyParts = varietyRaw.split(/[,\/]/).map(s => s.trim()).filter(Boolean);
  let varietyDisplay = '';
  if (varietyParts.length <= 1) {
    // 단일 품종 - 퍼센트/100 제거
    varietyDisplay = varietyRaw.replace(/\d+%/g, '').replace(/\b100\b/g, '').trim();
  } else {
    // 블렌딩 - 각 품종에서 이름과 퍼센트만 추출해서 짧게
    varietyDisplay = varietyParts.map(p => {
      const pct = p.match(/(\d+)%/);
      const name = p.replace(/\d+%/g, '').trim().split(' ')[0]; // 첫 단어만
      return pct ? `${name} ${pct[1]}%` : name;
    }).join(' / ');
  }

  return {
    path,
    title: cleanTitle,
    vintage,
    region: regionDisplay,
    country,
    variety: varietyDisplay,
    abv: get('도수') || '',
    tasting,
  };
}

// ── 메인 로드 함수 ────────────────────────────────
async function loadWines(forceRefresh) {
  const btn = document.getElementById('refresh-btn');
  const listEl = document.getElementById('wine-list');

  if (!forceRefresh) {
    const cached = getCache();
    if (cached && cached.length > 0) {
      allWines = cached;
      renderWines();
      const ts = new Date(parseInt(localStorage.getItem(CACHE_TS_KEY) || '0'));
      setStatus(`마지막 업데이트: ${ts.toLocaleDateString('ko-KR')}`);
      return;
    }
  }

  btn.classList.add('spinning');
  listEl.innerHTML = '<div class="state-msg">블로그에서 와인 목록을 가져오는 중…</div>';
  setStatus('불러오는 중…');

  try {
    const items = await fetchRSS();
    setStatus(`${items.length}개 포스팅 파싱 중…`);

    const wines = items
      .map(item => parseItem(item))
      .filter(w => w && w.title);

    allWines = wines;
    setCache(allWines);
    setStatus(`총 ${allWines.length}종 · 마지막 업데이트: ${new Date().toLocaleDateString('ko-KR')}`);
    renderWines();
  } catch (e) {
    console.error(e);
    listEl.innerHTML = '<div class="state-msg">불러오기 실패. 잠시 후 다시 시도해주세요.</div>';
    setStatus('');
  } finally {
    btn.classList.remove('spinning');
  }
}

// ── 필터 ─────────────────────────────────────────
function setFilter(country, btn) {
  currentFilter = country;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderWines();
}

// ── 렌더링 ────────────────────────────────────────
function renderWines() {
  const listEl = document.getElementById('wine-list');
  let wines = currentFilter === 'all'
    ? allWines
    : allWines.filter(w => w.country === currentFilter);

  if (wines.length === 0) {
    listEl.innerHTML = '<div class="state-msg">아직 기록된 와인이 없습니다.</div>';
    return;
  }

  // 국가별로 그룹핑
  const groups = {};
  const order = ['France', 'Italy', 'Spain', 'USA', 'Other'];
  wines.forEach(w => {
    const g = order.includes(w.country) ? w.country : 'Other';
    if (!groups[g]) groups[g] = [];
    groups[g].push(w);
  });

  const countryLabel = { France: '🇫🇷 France', Italy: '🇮🇹 Italy', Spain: '🇪🇸 Spain', USA: '🇺🇸 United States', Other: '🌍 Other' };

  let html = '';
  for (const country of order) {
    if (!groups[country]) continue;
    html += `<div class="section-header">
      <h2>${countryLabel[country]}</h2>
      <div class="section-line"></div>
    </div>
    <div class="wine-table-head">
      <span>와인명</span>
      <span>빈티지</span>
      <span>생산지</span>
      <span>품종</span>
      <span>시음노트</span>
    </div>`;

    groups[country].forEach((wine) => {
      const id = `wine-${wine.path.replace(/\//g, '')}`;
      html += `
      <div class="wine-row">
        <span class="col-name">${wine.title}</span>
        <span class="col-vintage">${wine.vintage}</span>
        <span class="col-region">${wine.region || '—'}</span>
        <span class="col-variety">${wine.variety || '—'}</span>
        <span class="col-note">
          ${wine.tasting
            ? `<button class="tasting-toggle" id="btn-${id}" onclick="toggleNote('${id}')">확인</button>`
            : '—'}
        </span>
      </div>
      ${wine.tasting ? `<div class="tasting-note-row" id="${id}">${wine.tasting}</div>` : ''}`;
    });
  }

  listEl.innerHTML = html;
}

function toggleNote(id) {
  const note = document.getElementById(id);
  note.classList.toggle('open');
}
</script>
</body>
</html>

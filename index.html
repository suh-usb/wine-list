<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>술쟁이 와인 노트</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Noto+Serif+KR:wght@300;400&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1714;
    --parchment: #f7f3ed;
    --cream: #ede8df;
    --rule: #c8bfb0;
    --muted: #8a8078;
    --red-wine: #6b1e2e;
    --gold: #b89a5a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--parchment);
    color: var(--ink);
    font-family: 'Noto Serif KR', serif;
    font-weight: 300;
    min-height: 100vh;
  }

  /* ── LOCK SCREEN ── */
  #lock-screen {
    position: fixed; inset: 0;
    background: var(--ink);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 1000;
    gap: 2rem;
  }

  #lock-screen h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(2rem, 5vw, 3.2rem);
    color: var(--parchment);
    letter-spacing: 0.15em;
    text-align: center;
  }

  #lock-screen p {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: var(--rule);
    font-size: 1rem;
    letter-spacing: 0.05em;
  }

  .lock-divider {
    width: 60px; height: 1px;
    background: var(--gold);
  }

  #lock-input-wrap {
    display: flex; flex-direction: column; align-items: center; gap: 0.75rem;
  }

  #password-input {
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--rule);
    color: var(--parchment);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    letter-spacing: 0.3em;
    text-align: center;
    width: 200px;
    padding: 0.4rem 0;
    outline: none;
    transition: border-color 0.2s;
  }
  #password-input:focus { border-bottom-color: var(--gold); }

  #lock-error {
    color: #c0706a;
    font-size: 0.8rem;
    letter-spacing: 0.05em;
    height: 1rem;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
  }

  #unlock-btn {
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.85rem;
    letter-spacing: 0.2em;
    padding: 0.6rem 2rem;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 0.5rem;
  }
  #unlock-btn:hover { background: var(--gold); color: var(--ink); }

  /* ── MAIN ── */
  #app { display: none; }

  /* ── HEADER ── */
  header {
    text-align: center;
    padding: 4rem 2rem 2rem;
    border-bottom: 1px solid var(--rule);
    position: relative;
  }

  .header-eyebrow {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: var(--muted);
    font-size: 0.85rem;
    letter-spacing: 0.15em;
    margin-bottom: 0.75rem;
  }

  header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(2.2rem, 5vw, 3.8rem);
    letter-spacing: 0.08em;
    line-height: 1.1;
    color: var(--ink);
  }

  .header-rule {
    display: flex; align-items: center; gap: 1rem;
    margin: 1.5rem auto;
    max-width: 300px;
    justify-content: center;
  }
  .header-rule span { width: 60px; height: 1px; background: var(--rule); display: block; }
  .header-rule .diamond {
    width: 5px; height: 5px;
    background: var(--gold);
    transform: rotate(45deg);
    flex-shrink: 0;
  }

  .header-subtitle {
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* ── CONTROLS ── */
  .controls {
    max-width: 900px;
    margin: 2rem auto 0;
    padding: 0 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .search-wrap {
    max-width: 900px;
    margin: 1rem auto 0;
    padding: 0 2rem;
  }

  #search-input {
    width: 100%;
    background: rgba(255,255,255,0.35);
    border: 1px solid var(--rule);
    color: var(--ink);
    font-family: 'Noto Serif KR', serif;
    font-size: 0.85rem;
    padding: 0.7rem 0.85rem;
    outline: none;
  }

  #search-input:focus { border-color: var(--gold); }
  #search-input::placeholder { color: var(--muted); }

  .stats {
    max-width: 900px;
    margin: 1.25rem auto 0;
    padding: 0 2rem;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--rule);
  }

  .stat {
    background: var(--parchment);
    padding: 0.9rem 1rem;
  }

  .stat strong {
    display: block;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.45rem;
    font-weight: 400;
    color: var(--red-wine);
  }

  .stat span {
    display: block;
    margin-top: 0.15rem;
    font-size: 0.68rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .filter-group {
    display: flex; gap: 0.5rem; flex-wrap: wrap;
  }

  .view-tabs {
    max-width: 900px;
    margin: 1.5rem auto 0;
    padding: 0 2rem;
    display: flex;
    gap: 0.5rem;
  }

  .tab-btn {
    background: transparent;
    border: 1px solid var(--rule);
    color: var(--muted);
    font-family: 'Noto Serif KR', serif;
    font-size: 0.78rem;
    letter-spacing: 0.08em;
    padding: 0.45rem 1rem;
    cursor: pointer;
    transition: all 0.15s;
  }

  .tab-btn.active,
  .tab-btn:hover {
    border-color: var(--red-wine);
    color: var(--red-wine);
    background: rgba(107,30,46,0.04);
  }

  .filter-btn {
    background: transparent;
    border: 1px solid var(--rule);
    color: var(--muted);
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    padding: 0.35rem 1rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover, .filter-btn.active {
    border-color: var(--red-wine);
    color: var(--red-wine);
    background: rgba(107,30,46,0.04);
  }

  .refresh-btn {
    background: transparent;
    border: none;
    color: var(--muted);
    font-family: 'Noto Serif KR', serif;
    font-size: 0.75rem;
    letter-spacing: 0.05em;
    cursor: pointer;
    display: flex; align-items: center; gap: 0.4rem;
    padding: 0.35rem 0;
    transition: color 0.2s;
  }
  .refresh-btn:hover { color: var(--ink); }
  .refresh-btn svg { transition: transform 0.5s; }
  .refresh-btn.spinning svg { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── STATUS ── */
  #status-bar {
    max-width: 900px;
    margin: 1rem auto 0;
    padding: 0 2rem;
    font-size: 0.75rem;
    color: var(--muted);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    min-height: 1.2rem;
  }

  /* ── WINE LIST ── */
  #wine-list {
    max-width: 900px;
    margin: 2rem auto 4rem;
    padding: 0 2rem;
  }

  #taste-profile {
    display: none;
    max-width: 900px;
    margin: 2rem auto 4rem;
    padding: 0 2rem;
  }

  .profile-grid {
    display: grid;
    grid-template-columns: minmax(0, 1.2fr) minmax(260px, 0.8fr);
    gap: 2rem;
    align-items: start;
  }

  .profile-section {
    border-top: 1px solid var(--rule);
    padding-top: 1rem;
    margin-bottom: 2rem;
  }

  .profile-section h2,
  .profile-section h3 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    letter-spacing: 0.12em;
    color: var(--red-wine);
  }

  .profile-section h2 { font-size: 1.35rem; }
  .profile-section h3 {
    font-size: 0.95rem;
    margin-bottom: 0.85rem;
  }

  .profile-summary {
    margin-top: 0.75rem;
    line-height: 1.9;
    color: #4a4540;
    font-size: 0.9rem;
  }

  .taste-bar {
    display: grid;
    grid-template-columns: 92px 1fr 42px;
    gap: 0.75rem;
    align-items: center;
    margin: 0.65rem 0;
    font-size: 0.78rem;
    color: #5a5450;
  }

  .taste-track {
    height: 8px;
    background: var(--cream);
    border: 1px solid var(--rule);
  }

  .taste-fill {
    height: 100%;
    background: var(--red-wine);
  }

  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  .chip {
    border: 1px solid var(--rule);
    color: #4a4540;
    padding: 0.35rem 0.6rem;
    font-size: 0.75rem;
    background: rgba(255,255,255,0.28);
  }

  .recommend-list {
    display: grid;
    gap: 0.75rem;
  }

  .recommend-item {
    border-left: 2px solid var(--gold);
    padding: 0.75rem 0 0.75rem 0.9rem;
    background: rgba(255,255,255,0.22);
  }

  .recommend-item a {
    color: var(--ink);
    text-decoration: none;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.02rem;
  }

  .recommend-item a:hover { color: var(--red-wine); }

  .recommend-meta {
    margin-top: 0.25rem;
    color: var(--muted);
    font-size: 0.72rem;
  }

  .recommend-reason {
    margin-top: 0.45rem;
    color: #4a4540;
    font-size: 0.78rem;
    line-height: 1.7;
  }

  /* ── SECTION HEADER (지역별) ── */
  .section-header {
    display: flex; align-items: center; gap: 1.5rem;
    margin: 2.5rem 0 1rem;
  }
  .section-header h2 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
  }
  .section-line { flex: 1; height: 1px; background: var(--rule); }

  /* ── WINE TABLE ── */
  .wine-table-head,
  .wine-row {
    display: grid;
    grid-template-columns: minmax(280px, 3fr) 78px minmax(130px, 1.1fr) minmax(150px, 1.4fr) 70px 78px;
    column-gap: 0.75rem;
  }

  .wine-table-head {
    padding: 0.4rem 0.8rem;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 0.2rem;
  }
  .wine-table-head span {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.68rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .wine-row {
    align-items: start;
    padding: 0.75rem 0.8rem;
    border-bottom: 1px solid var(--cream);
    transition: background 0.1s;
  }
  .wine-row:hover { background: rgba(184,154,90,0.05); }

  .wine-row .col-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    font-weight: 400;
    color: var(--ink);
    padding-right: 1rem;
    min-width: 0;
    word-break: normal;
    overflow-wrap: anywhere;
    white-space: normal;
    line-height: 1.45;
  }
  .wine-row .col-vintage {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.95rem;
    color: var(--muted);
    white-space: nowrap;
  }
  .wine-row .col-region,
  .wine-row .col-variety,
  .wine-row .col-abv {
    font-size: 0.78rem;
    letter-spacing: 0.04em;
    color: #5a5450;
    padding-right: 0.5rem;
    min-width: 0;
    white-space: normal;
    overflow: hidden;
    overflow-wrap: anywhere;
  }
  .wine-row .col-note { text-align: center; }

  .tasting-toggle {
    background: transparent;
    border: 1px solid var(--rule);
    color: var(--muted);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.72rem;
    letter-spacing: 0.05em;
    cursor: pointer;
    padding: 0.2rem 0.5rem;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .tasting-toggle:hover { border-color: var(--gold); color: var(--red-wine); }

  .post-link {
    color: var(--muted);
    text-decoration: none;
    border-bottom: 1px solid transparent;
  }
  .post-link:hover {
    color: var(--red-wine);
    border-bottom-color: var(--gold);
  }

  .tasting-note-row {
    display: none;
    padding: 0.8rem 1rem 1rem;
    background: var(--cream);
    border-left: 2px solid var(--gold);
    border-bottom: 1px solid var(--rule);
    font-size: 0.83rem;
    line-height: 1.9;
    color: #4a4540;
    white-space: pre-line;
    font-family: 'Noto Serif KR', serif;
  }
  .tasting-note-row.open { display: block; }

  @media (max-width: 860px) {
    .wine-table-head { display: none; }
    .wine-row {
      grid-template-columns: 1fr auto;
      grid-template-rows: auto auto;
      gap: 0.35rem 0.75rem;
      padding: 1rem 0.8rem;
    }
    .wine-row .col-name { grid-column: 1; grid-row: 1; }
    .wine-row .col-vintage { grid-column: 2; grid-row: 1; }
    .wine-row .col-region { grid-column: 1; grid-row: 2; font-size: 0.72rem; }
    .wine-row .col-variety { display: none; }
    .wine-row .col-abv { display: none; }
    .wine-row .col-note { grid-column: 2; grid-row: 2; }
  }

  /* ── EMPTY / LOADING ── */
  .state-msg {
    text-align: center;
    padding: 4rem 2rem;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: var(--muted);
    font-size: 1rem;
    letter-spacing: 0.05em;
  }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    padding: 2rem;
    border-top: 1px solid var(--rule);
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    color: var(--rule);
    font-family: 'Cormorant Garamond', serif;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .wine-meta { gap: 0.8rem; }
    .wine-name { font-size: 1rem; }
    .controls { flex-direction: column; align-items: flex-start; }
    .stats { grid-template-columns: 1fr; }
    .profile-grid { grid-template-columns: 1fr; }
    .view-tabs { flex-wrap: wrap; }
  }
</style>
</head>
<body>

<!-- LOCK SCREEN -->
<div id="lock-screen">
  <p class="header-eyebrow" style="color:#8a8078">술쟁이 와인 노트</p>
  <div class="lock-divider"></div>
  <h1>🍷</h1>
  <div id="lock-input-wrap">
    <input type="password" id="password-input" placeholder="· · · · ·" autocomplete="off">
    <div id="lock-error"></div>
    <button id="unlock-btn" onclick="unlock()">ENTER</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <header>
    <p class="header-eyebrow">Ma Cave Personnelle</p>
    <h1>술쟁이 와인 노트</h1>
    <div class="header-rule">
      <span></span>
      <div class="diamond"></div>
      <span></span>
    </div>
    <p class="header-subtitle">Carnet de Dégustation</p>
  </header>

  <div class="controls">
    <div class="filter-group">
      <button class="filter-btn active" onclick="setFilter('all', this)">전체</button>
      <button class="filter-btn" onclick="setFilter('France', this)">🇫🇷 France</button>
      <button class="filter-btn" onclick="setFilter('Italy', this)">🇮🇹 Italy</button>
      <button class="filter-btn" onclick="setFilter('USA', this)">🇺🇸 USA</button>
      <button class="filter-btn" onclick="setFilter('Spain', this)">🇪🇸 Spain</button>
      <button class="filter-btn" onclick="setFilter('Germany', this)">🇩🇪 Germany</button>
      <button class="filter-btn" onclick="setFilter('Australia', this)">🇦🇺 Australia</button>
      <button class="filter-btn" onclick="setFilter('Chile', this)">🇨🇱 Chile</button>
      <button class="filter-btn" onclick="setFilter('Other', this)">Other</button>
    </div>
    <button class="refresh-btn" id="refresh-btn" onclick="loadWines(true)">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M23 4v6h-6M1 20v-6h6"/>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
      </svg>
      업데이트
    </button>
  </div>

  <div class="search-wrap">
    <input id="search-input" type="search" placeholder="와인명, 지역, 품종으로 검색" autocomplete="off">
  </div>

  <div class="stats" id="stats" aria-label="와인 기록 요약">
    <div class="stat"><strong>0</strong><span>Total Bottles</span></div>
    <div class="stat"><strong>0</strong><span>Countries</span></div>
    <div class="stat"><strong>0</strong><span>With Notes</span></div>
  </div>

  <div id="status-bar"></div>
  <div class="view-tabs" aria-label="보기 전환">
    <button class="tab-btn active" id="tab-list" onclick="setView('list')">와인 리스트</button>
    <button class="tab-btn" id="tab-profile" onclick="setView('profile')">취향 분석</button>
  </div>
  <div id="wine-list"><div class="state-msg">와인 리스트를 불러오는 중…</div></div>
  <div id="taste-profile"><div class="state-msg">취향 데이터를 계산하는 중…</div></div>

  <footer>술쟁이 와인 노트 &nbsp;·&nbsp; 개인 시음 기록</footer>
</div>

<script>
// ── 설정 ──────────────────────────────────────────
const PASSWORD_HASH = "9875add235b87ac23789593cd657837e6fa9ffed5f7f8fd9cf12340aee38b927";
const WINE_API = "/api/wines";
const CACHE_KEY = "wine_cache";
const CACHE_TS_KEY = "wine_cache_ts";
const CACHE_VERSION_KEY = "wine_cache_version";
const CACHE_VERSION = "3";

let allWines = [];
let currentFilter = 'all';
let searchQuery = '';
let currentView = 'list';

const TASTE_DIMENSIONS = [
  { key: 'freshness', label: '산도와 신선함', terms: ['산도', '산미', '신선', '상큼', '레몬', '자몽', '시트러스', '라임'] },
  { key: 'structure', label: '구조감과 탄닌', terms: ['탄닌', '구조', '구조감', '강한', '단단', '묵직', '농축', '파워'] },
  { key: 'minerality', label: '미네랄과 짭짤함', terms: ['미네랄', '짭짤', '짠', '돌', '석회', '해조', '바다'] },
  { key: 'floral', label: '플로럴과 붉은 과실', terms: ['플로럴', '장미', '꽃', '딸기', '체리', '라즈베리', '붉은'] },
  { key: 'earthy', label: '흙내음과 숙성감', terms: ['흙', '낙엽', '가죽', '버섯', '숙성', '올빈', '시골', '동물'] },
  { key: 'spice', label: '스파이스와 허브', terms: ['스파이스', '허브', '후추', '정향', '계피', '삼나무', '향신료'] },
  { key: 'texture', label: '부드러운 질감', terms: ['부드', '실키', '섬세', '투명', '맑', '편안', '우아'] },
  { key: 'richness', label: '진한 과실과 풍부함', terms: ['진한', '짙은', '풍부', '과실미', '달달', '잼', '농밀', '꿀'] },
];

const POSITIVE_TERMS = ['맛있는', '좋음', '좋고', '좋다', '훌륭', '성공', '기대보다', '가성비', '최고', '인상적', '만족'];
const NEGATIVE_TERMS = ['아쉬', '부족', '약함', '묽', '별로', '실망', '부담', '과함'];

// ── 잠금 해제 ─────────────────────────────────────
async function sha256(text) {
  const data = new TextEncoder().encode(text);
  const hash = await crypto.subtle.digest('SHA-256', data);
  return [...new Uint8Array(hash)].map(b => b.toString(16).padStart(2, '0')).join('');
}

async function unlock() {
  const val = document.getElementById('password-input').value;
  if (await sha256(val) === PASSWORD_HASH) {
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadWines(false);
  } else {
    document.getElementById('lock-error').textContent = '비밀번호가 맞지 않습니다';
    document.getElementById('password-input').value = '';
    setTimeout(() => document.getElementById('lock-error').textContent = '', 2000);
  }
}

document.getElementById('password-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') unlock();
});

document.getElementById('search-input').addEventListener('input', e => {
  searchQuery = e.target.value.trim().toLowerCase();
  renderWines();
});

// ── 캐시 ─────────────────────────────────────────
function getCache() {
  try {
    if (localStorage.getItem(CACHE_VERSION_KEY) !== CACHE_VERSION) return null;
    const data = localStorage.getItem(CACHE_KEY);
    return data ? JSON.parse(data) : null;
  } catch { return null; }
}

function setCache(wines) {
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify(wines));
    localStorage.setItem(CACHE_TS_KEY, Date.now().toString());
    localStorage.setItem(CACHE_VERSION_KEY, CACHE_VERSION);
  } catch {}
}

// ── 상태 메시지 ───────────────────────────────────
function setStatus(msg) {
  document.getElementById('status-bar').textContent = msg;
}

// ── 데이터 로드 ───────────────────────────────────
async function fetchWines() {
  const resp = await fetch(WINE_API);
  if (!resp.ok) throw new Error(`와인 목록 요청 실패: ${resp.status}`);
  const data = await resp.json();
  return data.wines || [];
}

function parseItem(item) {
  const title = decodeEntities(item.querySelector('title')?.textContent?.trim() || '');
  const link = item.querySelector('link')?.textContent?.trim() || '';
  const categories = [...item.querySelectorAll('category')]
    .map(el => decodeEntities(el.textContent?.trim() || ''))
    .filter(Boolean);
  const categoryText = categories.join(' ');
  const publishedAt = item.querySelector('pubDate')?.textContent?.trim() || '';
  
  // 여행 글 제외
  if (categoryText.includes('여행') || title.includes('여행')) return null;

  // RSS description에서 본문 텍스트 추출
  const descRaw = item.querySelector('description')?.textContent || '';
  const descDoc = new DOMParser().parseFromString(descRaw, 'text/html');
  const body = descDoc.body?.textContent || '';

  const path = link.replace('https://oaklifeisgood.tistory.com', '');
  const image = descDoc.querySelector('img')?.getAttribute('src') || '';

  return parseWineData(body, title, path, categories, publishedAt, image);
}

function parseWineData(body, title, path, categories, publishedAt, image) {
  const get = (label) => {
    const regex = new RegExp(`${label}\\s*[:：]\\s*([^\\n]+)`, 'i');
    const m = body.match(regex);
    return m ? m[1].replace(/[*_]/g, '').trim() : '';
  };

  // 제목에서 장식용 pictograph만 제거한다. \p{Emoji}는 숫자도 잡을 수 있다.
  const cleanTitle = title.replace(/[\p{Extended_Pictographic}\uFE0F]/gu, '').replace(/\s+/g, ' ').trim();

  // 빈티지: 제목 또는 본문에서
  const titleYear = cleanTitle.match(/\b(?:19|20)\d{2}\b/)?.[0];
  const bodyVintage = get('빈티지');
  const vintage = titleYear || bodyVintage || 'NV';

  // 지역 → 국가
  const region = get('지역') || '';
  const country = detectCountry(`${region} ${categories.join(' ')}`);

  // 테이스팅 노트
  const tastingMatch = body.match(/테이스팅\s*노트[^\n]*\n([\s\S]*?)(?=서쳐\s*가격|생산자|끝\.|$)/i);
  const tasting = tastingMatch ? normalizeText(tastingMatch[1].replace(/[✔▶✅]/g, '')) : '';

  // 지역: 마지막 단어만 (Gevrey-Chambertin, Barolo 등)
  const regionFull = region;
  const regionDisplay = region.includes(',')
    ? region.split(',').slice(-1)[0].trim()
    : region.trim();

  // 품종: 레이블 제거 후 단일이면 이름만, 블렌딩이면 비율 표시
  const varietyRaw = (get('품종') || '').replace(/^품종\s*[:：]\s*/i, '').trim();
  const varietyParts = varietyRaw.split(/[,\/]/).map(s => s.trim()).filter(Boolean);
  let varietyDisplay = '';
  if (varietyParts.length <= 1) {
    varietyDisplay = varietyRaw.replace(/\d+%/g, '').replace(/\b100\b/g, '').trim();
  } else {
    varietyDisplay = varietyParts.map(p => {
      const pct = p.match(/(\d+)%/);
      const name = p.replace(/\d+%/g, '').trim().split(' ')[0];
      return pct ? `${name} ${pct[1]}%` : name;
    }).join(' / ');
  }

  // 도수: 레이블 제거
  const abvRaw = (get('도수') || '').replace(/^도수\s*[:：]\s*/i, '').trim();

  return {
    path,
    url: `https://oaklifeisgood.tistory.com${path}`,
    title: cleanTitle,
    vintage,
    region: regionDisplay,
    regionFull,
    country,
    variety: varietyDisplay,
    abv: abvRaw,
    tasting,
    categories,
    publishedAt,
    image,
  };
}

function decodeEntities(text) {
  const textarea = document.createElement('textarea');
  textarea.innerHTML = text;
  return textarea.value;
}

function normalizeText(text) {
  return text
    .replace(/\u200d/g, '')
    .replace(/\n{3,}/g, '\n\n')
    .replace(/[ \t]+/g, ' ')
    .trim();
}

function detectCountry(text) {
  const source = text.toLowerCase();
  if (source.includes('italy') || source.includes('이탈리아') || source.includes('barolo') || source.includes('toscana')) return 'Italy';
  if (source.includes('usa') || source.includes('미국') || source.includes('california') || source.includes('napa')) return 'USA';
  if (source.includes('spain') || source.includes('스페인') || source.includes('rioja') || source.includes('priorat')) return 'Spain';
  if (source.includes('germany') || source.includes('독일') || source.includes('mosel')) return 'Germany';
  if (source.includes('australia') || source.includes('호주')) return 'Australia';
  if (source.includes('chile') || source.includes('칠레')) return 'Chile';
  if (source.includes('france') || source.includes('프랑스') || source.includes('bourgogne') || source.includes('bordeaux') || source.includes('champagne')) return 'France';
  return 'Other';
}

// ── 메인 로드 함수 ────────────────────────────────
async function loadWines(forceRefresh) {
  const btn = document.getElementById('refresh-btn');
  const listEl = document.getElementById('wine-list');

  if (!forceRefresh) {
    const cached = getCache();
    if (cached && cached.length > 0) {
      allWines = cached;
      renderWines();
      if (currentView === 'profile') renderTasteProfile();
      const ts = new Date(parseInt(localStorage.getItem(CACHE_TS_KEY) || '0'));
      setStatus(`마지막 업데이트: ${ts.toLocaleDateString('ko-KR')}`);
      return;
    }
  }

  btn.classList.add('spinning');
  listEl.innerHTML = '<div class="state-msg">블로그에서 와인 목록을 가져오는 중…</div>';
  setStatus('불러오는 중…');

  try {
    setStatus('티스토리 전체 글을 파싱 중…');
    const wines = await fetchWines();

    allWines = wines;
    setCache(allWines);
    setStatus(`총 ${allWines.length}종 · 마지막 업데이트: ${new Date().toLocaleDateString('ko-KR')}`);
    renderWines();
    if (currentView === 'profile') renderTasteProfile();
  } catch (e) {
    console.error(e);
    listEl.innerHTML = '<div class="state-msg">불러오기 실패. 잠시 후 다시 시도해주세요.</div>';
    setStatus('');
  } finally {
    btn.classList.remove('spinning');
  }
}

// ── 필터 ─────────────────────────────────────────
function setFilter(country, btn) {
  currentFilter = country;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderWines();
}

function setView(view) {
  currentView = view;
  document.getElementById('wine-list').style.display = view === 'list' ? 'block' : 'none';
  document.getElementById('taste-profile').style.display = view === 'profile' ? 'block' : 'none';
  document.getElementById('tab-list').classList.toggle('active', view === 'list');
  document.getElementById('tab-profile').classList.toggle('active', view === 'profile');

  if (view === 'profile') renderTasteProfile();
}

// ── 렌더링 ────────────────────────────────────────
function renderWines() {
  const listEl = document.getElementById('wine-list');
  let wines = currentFilter === 'all'
    ? allWines
    : allWines.filter(w => w.country === currentFilter);

  if (searchQuery) {
    wines = wines.filter(w => {
      const haystack = [
        w.title,
        w.vintage,
        w.region,
        w.regionFull,
        w.country,
        w.variety,
        w.abv,
        ...(w.categories || []),
      ].join(' ').toLowerCase();
      return haystack.includes(searchQuery);
    });
  }

  updateStats(wines);

  if (wines.length === 0) {
    listEl.innerHTML = '<div class="state-msg">조건에 맞는 와인이 없습니다.</div>';
    return;
  }

  // 국가별로 그룹핑
  const groups = {};
  const order = ['France', 'Italy', 'Spain', 'USA', 'Germany', 'Australia', 'Chile', 'Other'];
  wines.forEach(w => {
    const g = order.includes(w.country) ? w.country : 'Other';
    if (!groups[g]) groups[g] = [];
    groups[g].push(w);
  });

  const countryLabel = {
    France: '🇫🇷 France',
    Italy: '🇮🇹 Italy',
    Spain: '🇪🇸 Spain',
    USA: '🇺🇸 United States',
    Germany: '🇩🇪 Germany',
    Australia: '🇦🇺 Australia',
    Chile: '🇨🇱 Chile',
    Other: '🌍 Other'
  };

  let html = '';
  for (const country of order) {
    if (!groups[country]) continue;
    html += `<div class="section-header">
      <h2>${countryLabel[country]}</h2>
      <div class="section-line"></div>
    </div>
    <div class="wine-table-head">
      <span>와인명</span>
      <span>빈티지</span>
      <span>생산지</span>
      <span>품종</span>
      <span>도수</span>
      <span>시음노트</span>
    </div>`;

    groups[country].forEach((wine) => {
      const id = `wine-${wine.path.replace(/[^a-zA-Z0-9_-]/g, '')}`;
      html += `
      <div class="wine-row">
        <span class="col-name"><a class="post-link" href="${escapeAttr(wine.url)}" target="_blank" rel="noopener">${escapeHtml(wine.title)}</a></span>
        <span class="col-vintage">${escapeHtml(wine.vintage)}</span>
        <span class="col-region" title="${escapeAttr(wine.regionFull || wine.region)}">${escapeHtml(wine.region || '—')}</span>
        <span class="col-variety">${escapeHtml(wine.variety || '—')}</span>
        <span class="col-abv">${escapeHtml(wine.abv || '—')}</span>
        <span class="col-note">
          ${wine.tasting
            ? `<button class="tasting-toggle" id="btn-${id}" onclick="toggleNote('${id}')">확인</button>`
            : '—'}
        </span>
      </div>
      ${wine.tasting ? `<div class="tasting-note-row" id="${id}">${escapeHtml(wine.tasting)}</div>` : ''}`;
    });
  }

  listEl.innerHTML = html;
}

function renderTasteProfile() {
  const profileEl = document.getElementById('taste-profile');
  if (!allWines.length) {
    profileEl.innerHTML = '<div class="state-msg">분석할 와인이 없습니다.</div>';
    return;
  }

  const profile = buildTasteProfile(allWines);
  const topDimensions = profile.dimensions.slice(0, 4);

  profileEl.innerHTML = `
    <div class="profile-grid">
      <div>
        <section class="profile-section">
          <h2>취향 요약</h2>
          <p class="profile-summary">${escapeHtml(profile.summary)}</p>
        </section>

        <section class="profile-section">
          <h3>자주 반응한 감각</h3>
          ${profile.dimensions.map(dim => `
            <div class="taste-bar">
              <span>${escapeHtml(dim.label)}</span>
              <div class="taste-track"><div class="taste-fill" style="width:${dim.percent}%"></div></div>
              <span>${dim.count}</span>
            </div>
          `).join('')}
        </section>

        <section class="profile-section">
          <h3>취향 키워드</h3>
          <div class="chips">
            ${profile.keywords.map(item => `<span class="chip">${escapeHtml(item.word)} ${item.count}</span>`).join('')}
          </div>
        </section>
      </div>

      <div>
        <section class="profile-section">
          <h3>잘 맞았던 쪽</h3>
          <div class="chips">
            ${topDimensions.map(dim => `<span class="chip">${escapeHtml(dim.label)}</span>`).join('')}
          </div>
        </section>

        <section class="profile-section">
          <h3>다음 병 후보</h3>
          <div class="recommend-list">
            ${profile.recommendations.map(wine => `
              <div class="recommend-item">
                <a href="${escapeAttr(wine.url)}" target="_blank" rel="noopener">${escapeHtml(wine.title)}</a>
                <div class="recommend-meta">${escapeHtml([wine.country, wine.region, wine.vintage].filter(Boolean).join(' · '))}</div>
                <div class="recommend-reason">${escapeHtml(wine.reason)}</div>
              </div>
            `).join('')}
          </div>
        </section>
      </div>
    </div>
  `;
}

function buildTasteProfile(wines) {
  const scored = wines.map(wine => scoreWine(wine));
  const maxCount = Math.max(1, ...TASTE_DIMENSIONS.map(dim => {
    return scored.reduce((sum, item) => sum + item.scores[dim.key], 0);
  }));

  const dimensions = TASTE_DIMENSIONS.map(dim => {
    const count = scored.reduce((sum, item) => sum + item.scores[dim.key], 0);
    return {
      ...dim,
      count,
      percent: Math.round((count / maxCount) * 100),
    };
  }).sort((a, b) => b.count - a.count);

  const keywordCounts = new Map();
  TASTE_DIMENSIONS.flatMap(dim => dim.terms).forEach(term => {
    const count = wines.filter(wine => includesTerm(wine.tasting, term)).length;
    if (count > 0) keywordCounts.set(term, count);
  });

  const keywords = [...keywordCounts.entries()]
    .map(([word, count]) => ({ word, count }))
    .sort((a, b) => b.count - a.count)
    .slice(0, 16);

  const topKeys = dimensions.slice(0, 4).map(dim => dim.key);
  const recommendations = scored
    .map(item => {
      const styleScore = topKeys.reduce((sum, key) => sum + item.scores[key], 0);
      const total = styleScore + item.positive * 2 - item.negative;
      return { ...item.wine, total, reason: recommendationReason(item.wine, item.scores, dimensions) };
    })
    .filter(wine => wine.total > 0)
    .sort((a, b) => b.total - a.total)
    .slice(0, 6);

  return {
    dimensions,
    keywords,
    recommendations,
    summary: makeTasteSummary(wines, dimensions),
  };
}

function scoreWine(wine) {
  const scores = {};
  TASTE_DIMENSIONS.forEach(dim => {
    scores[dim.key] = dim.terms.reduce((sum, term) => sum + countTerm(wine.tasting, term), 0);
  });

  return {
    wine,
    scores,
    positive: POSITIVE_TERMS.reduce((sum, term) => sum + countTerm(wine.tasting, term), 0),
    negative: NEGATIVE_TERMS.reduce((sum, term) => sum + countTerm(wine.tasting, term), 0),
  };
}

function makeTasteSummary(wines, dimensions) {
  const top = dimensions.slice(0, 3).map(dim => dim.label).join(', ');
  const countries = Object.entries(wines.reduce((acc, wine) => {
    acc[wine.country] = (acc[wine.country] || 0) + 1;
    return acc;
  }, {})).sort((a, b) => b[1] - a[1]).slice(0, 3).map(([country, count]) => `${country} ${count}병`).join(', ');

  return `총 ${wines.length}개의 시음기에서 반복적으로 나온 표현을 기준으로 보면, ${top} 쪽 반응이 가장 강합니다. 국가별로는 ${countries} 비중이 높아서 부르고뉴/보르도 중심의 프랑스 와인 경험이 취향 데이터의 큰 축을 만들고 있습니다.`;
}

function recommendationReason(wine, scores, dimensions) {
  const matched = dimensions
    .filter(dim => scores[dim.key] > 0)
    .slice(0, 3)
    .map(dim => dim.label);

  if (!matched.length) return '시음노트의 표현 밀도가 높아 다시 비교해보기 좋은 병입니다.';
  return `${matched.join(', ')} 표현이 반복되어 현재 취향 축과 잘 맞는 병입니다.`;
}

function countTerm(text, term) {
  if (!text || !term) return 0;
  return (text.match(new RegExp(escapeRegExp(term), 'gi')) || []).length;
}

function includesTerm(text, term) {
  return countTerm(text, term) > 0;
}

function updateStats(wines) {
  const stats = document.getElementById('stats');
  const countries = new Set(wines.map(w => w.country).filter(Boolean));
  const noted = wines.filter(w => w.tasting).length;

  stats.innerHTML = `
    <div class="stat"><strong>${wines.length}</strong><span>Total Bottles</span></div>
    <div class="stat"><strong>${countries.size}</strong><span>Countries</span></div>
    <div class="stat"><strong>${noted}</strong><span>With Notes</span></div>
  `;
}

function escapeHtml(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function escapeAttr(value) {
  return escapeHtml(value);
}

function escapeRegExp(value) {
  return String(value).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function toggleNote(id) {
  const note = document.getElementById(id);
  note.classList.toggle('open');
}
